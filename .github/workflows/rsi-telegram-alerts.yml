name: RSI and Session Telegram Alerts

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run RSI alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/rsi_alerts.py

      - name: Run session alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SESSION_STATUS: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python scripts/session_alerts.py

      - name: Commit updated alert states
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rsi_alert_state.json session_alert_state.json
          git commit -m "Update alert states" || echo "No changes to commit"
          git push
