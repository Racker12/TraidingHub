name: Trading Score, News Risk, Session and Command Telegram Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Telegram command replies
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python scripts/telegram_commands.py

      - name: Run Trading Score alerts with News Risk
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TRADING_SCORE_MIN: "70"
          TRADING_SCORE_STRONG: "80"
          TRADING_SCORE_RESET_BELOW: "60"
          TRADING_SCORE_COOLDOWN_HOURS: "6"
          SEND_INITIAL_SCORE_ALERTS: "false"
        run: |
          python scripts/trading_score_alerts.py

      - name: Run LSX and market session alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SESSION_TIMEZONE: "Europe/Berlin"
          SEND_INITIAL_SESSION_SUMMARY: "auto"
        run: |
          python scripts/session_alerts.py

      - name: Commit updated alert and command states
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rsi_alert_state.json session_alert_state.json telegram_command_state.json trading_score_state.json
          git commit -m "Update bot states" || echo "No changes to commit"
          git push
